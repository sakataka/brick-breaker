name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quick-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Install
        run: vp install

      - name: Vite+ Check
        run: vp check

      - name: Deadcode
        run: vp run deadcode

      - name: Unit Tests
        run: vp test

      - name: Verify Change Coverage
        run: vp run verify:change-coverage

      - name: Check Architecture Boundaries
        run: vp run check:arch

  build:
    needs: quick-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Install
        run: vp install

      - name: Build
        run: vp build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  e2e:
    needs: [quick-guard, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Install
        run: vp install

      - name: Cache Playwright Browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install Playwright Browser
        run: vp exec playwright install --with-deps chromium

      - name: E2E
        run: vp run e2e:ci

  ts-next-eval:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Install
        run: vp install

      - name: TypeScript Next App
        run: vp dlx -p typescript@beta tsc --noEmit -p tsconfig.app.json

      - name: TypeScript Next Test
        run: vp dlx -p typescript@beta tsc --noEmit -p tsconfig.test.json
