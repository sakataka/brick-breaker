name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  refactor-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Refactor Audit (PR strict)
        if: github.event_name == 'pull_request'
        run: bun run refactor:audit --strict --report-file artifacts/refactor-audit.txt

      - name: Refactor Audit (push report)
        if: github.event_name != 'pull_request'
        run: bun run refactor:audit --no-strict --report-file artifacts/refactor-audit.txt

      - name: Upload Refactor Audit Report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: refactor-audit
          path: artifacts/refactor-audit.txt

  quick-guard:
    needs: refactor-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Local Guardrail Suite
        run: bun run guard:local

      - name: Verify Change Coverage
        run: bun run verify:change-coverage

      - name: Check Architecture Boundaries
        run: bun run check:arch

  build:
    needs: quick-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  e2e:
    needs: [quick-guard, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Cache Playwright Browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install Playwright Browser
        run: bunx playwright install --with-deps chromium

      - name: E2E
        run: bun run e2e:ci

  ts-next-eval:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install
        run: bun install --frozen-lockfile

      - name: TypeScript Next App
        run: bunx --package typescript@beta tsc --noEmit -p tsconfig.app.json

      - name: TypeScript Next Test
        run: bunx --package typescript@beta tsc --noEmit -p tsconfig.test.json
